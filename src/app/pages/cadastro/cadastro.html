    <main>
        <section id="sectionCadastro">
            <h1>CRIE SUA CONTA</h1>
            <img src="./assets/images/decoracao.png" alt="Decoração de flor em cor verde" id="imageDecoracao">
            <form method="post">
                <label class="campo" for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Dandara De Quintela Perez" required>
                <label class="campo" for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="@dandaradequintela" required>
                <label class="campo" for="numero">Número de Telefone:</label>
                <input type="tel" id="numero" name="numero" placeholder="(99) 99999-9999" required>
                <label class="campo" for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="qwe123!@#" required>
                <label class="campo" for="confiraSenha">Confira sua senha:</label>
                <input type="password" id="confiraSenha" name="confiraSenha" placeholder="qwe123!@#" required>

                <button type="submit">Cadastrar</button>
            </form>

            <p><small>Já tem conta? <a routerLink="/Home">Entrar</a></small></p>
        </section>
    </main>
